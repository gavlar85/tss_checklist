<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dassault Helper</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: #0d1b2f;
      --panel-2: #122641;
      --input-bg: #081525;
      --output-bg: #050d18;
      --text: #e8f1ff;
      --heading: #ffffff;
      --muted: #93a8c4;
      --accent: #38bdf8;
      --accent-2: #f59e0b;
      --border: rgba(148, 163, 184, 0.25);
      --success: #22c55e;
      --shadow: rgba(0, 0, 0, 0.35);
      --body-gradient: radial-gradient(circle at top left, rgba(56, 189, 248, 0.14), transparent 34%);
    }

    body.light-mode {
      --bg: #eef4fb;
      --panel: #ffffff;
      --panel-2: #e8f1fb;
      --input-bg: #ffffff;
      --output-bg: #f8fbff;
      --text: #102033;
      --heading: #07111f;
      --muted: #52657d;
      --accent: #0369a1;
      --accent-2: #b45309;
      --border: rgba(15, 23, 42, 0.16);
      --success: #15803d;
      --shadow: rgba(15, 23, 42, 0.14);
      --body-gradient: radial-gradient(circle at top left, rgba(3, 105, 161, 0.12), transparent 34%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--body-gradient), var(--bg);
      color: var(--text);
      padding: 28px;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 22px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .header h1 {
      margin: 0 0 6px;
      font-size: 30px;
      letter-spacing: 0.03em;
    }

    .header p {
      margin: 0;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: start;
    }

    .card {
      background: linear-gradient(180deg, color-mix(in srgb, var(--panel-2) 86%, transparent), color-mix(in srgb, var(--panel) 94%, transparent));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 18px 42px var(--shadow);
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 17px;
      color: var(--heading);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    select,
    input {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 15px;
      outline: none;
    }

    select:focus,
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.16);
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    textarea {
      width: 100%;
      min-height: 420px;
      resize: vertical;
      border: 1px solid var(--border);
      background: var(--output-bg);
      color: var(--text);
      border-radius: 14px;
      padding: 16px;
      line-height: 1.45;
      font-family: Consolas, Monaco, 'Courier New', monospace;
      font-size: 15px;
      outline: none;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.03em;
      cursor: pointer;
      color: #06101d;
      background: var(--accent);
    }

    button.secondary,
    .theme-toggle {
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--border);
    }

    .theme-toggle {
      flex: 0 0 auto;
      padding: 9px 12px;
      font-size: 12px;
    }

    .status {
      color: var(--success);
      font-weight: 700;
      min-height: 20px;
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .standard-weight {
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel-2) 72%, transparent);
      color: var(--text);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 15px;
      font-weight: 800;
    }

    .standard-weight small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    @media (max-width: 850px) {
      body {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="header-top">
        <div>
          <h1>Dassault Helper</h1>
          <p>Select crew and payload settings, then copy the generated client instruction block.</p>
        </div>
        <button id="themeToggle" type="button" class="theme-toggle">Light Mode</button>
      </div>
    </header>

    <section class="grid">
      <div class="card">
        <h2>Crew Selection</h2>

        <div class="field">
          <label for="picSelect">PIC</label>
          <select id="picSelect"></select>
        </div>

        <div class="field">
          <label for="sicSelect">SIC</label>
          <select id="sicSelect"></select>
        </div>

        <div class="field">
          <label for="faSelect">FA</label>
          <select id="faSelect"></select>
        </div>

        <h2 style="margin-top: 22px;">W&amp;B / Payload</h2>

        <div class="field">
          <label for="profileSelect">W&amp;B Profile</label>
          <select id="profileSelect">
            <option value="VIP seat 2/1">VIP seat 2/1</option>
            <option value="VIP seat 2/0">VIP seat 2/0</option>
          </select>
        </div>

        <div class="mini-grid">
          <div class="field">
            <label for="childrenCount">Children</label>
            <input id="childrenCount" type="number" value="0" min="0" />
          </div>
          <div class="field">
            <label>Standard Child Weight</label>
            <div class="standard-weight">77LBS<small>2–14 years</small></div>
          </div>
        </div>

        <div class="mini-grid">
          <div class="field">
            <label for="malesCount">Males</label>
            <input id="malesCount" type="number" value="4" min="0" />
          </div>
          <div class="field">
            <label>Standard Male Weight</label>
            <div class="standard-weight">203LBS</div>
          </div>
        </div>

        <div class="mini-grid">
          <div class="field">
            <label for="femalesCount">Females</label>
            <input id="femalesCount" type="number" value="1" min="0" />
          </div>
          <div class="field">
            <label>Standard Female Weight</label>
            <div class="standard-weight">163LBS</div>
          </div>
        </div>

        <div class="mini-grid">
          <div class="field">
            <label for="bagCount">Bags</label>
            <input id="bagCount" type="number" value="0" min="0" />
          </div>
          <div class="field">
            <label>Standard Bag Weight</label>
            <div class="standard-weight">29LBS</div>
          </div>
        </div>

        <div class="field">
          <label for="cargoWeight">Additional Cargo LBS</label>
          <input id="cargoWeight" type="number" value="0" min="0" />
        </div>

        <p class="hint">Replace the names in the <strong>crewNames</strong> array inside the script with the list you provide.</p>
      </div>

      <div class="card">
        <h2>Generated Copy Block</h2>
        <textarea id="outputBlock" readonly></textarea>
        <div class="actions">
          <button id="copyBtn" type="button">Copy Text Block</button>
          <button id="resetBtn" type="button" class="secondary">Reset Defaults</button>
          <span id="copyStatus" class="status"></span>
        </div>
      </div>
    </section>
  </main>

  <script>
    // Replace this list with the names you provide.
    // The same list is currently used for PIC, SIC and FA dropdowns.
    // If you want separate PIC/SIC/FA lists, use the optional arrays below instead.
    const crewNames = [
      "SELECT NAME",
      "Damien BRAULT",
      "Nicolas DESIDE",
      "Antoine DOUSSAUD",
      "Dimitri DROBYSZ",
      "Sébastien DUPONT DE DINECHIN",
      "Bruno FERRY",
      "François-Xavier GAROT",
      "Henri MAHE",
      "Fabrice VALETTE",
      "Christophe BOURT",
      "Jérémy DANTUNG",
      "Fabrice DOUGNAC",
      "Cédric CARLE",
      "Stéphane DUMONT",
      "Olivier PERRIAUD",
      "Philippe CANALI",
      "Olivier FROMENT",
      "Jean-Pascal LEMESRE",
      "Brice SEBAN",
      "Hubert GIRAUD",
      "Guillaume DELEUZE",
      "Robin MASSE",
      "Cyril DABADIE",
      "Alexis HOURLE"
    ];

    // Optional separate role-specific lists.
    // Leave as null to use crewNames for all dropdowns.
    const picNames = null;
    const sicNames = null;
    const faNames = null;

    const STANDARD_WEIGHTS = {
      male: 203,
      female: 163,
      child: 77,
      bag: 29
    };

    const defaults = {
      profile: "VIP seat 2/1",
      males: 4,
      females: 1,
      children: 0,
      bagCount: 0,
      cargo: 0
    };

    const els = {
      pic: document.getElementById("picSelect"),
      sic: document.getElementById("sicSelect"),
      fa: document.getElementById("faSelect"),
      profile: document.getElementById("profileSelect"),
      males: document.getElementById("malesCount"),
      females: document.getElementById("femalesCount"),
      children: document.getElementById("childrenCount"),
      bagCount: document.getElementById("bagCount"),
      cargo: document.getElementById("cargoWeight"),
      output: document.getElementById("outputBlock"),
      copyBtn: document.getElementById("copyBtn"),
      resetBtn: document.getElementById("resetBtn"),
      copyStatus: document.getElementById("copyStatus"),
      themeToggle: document.getElementById("themeToggle")
    };

    function populateDropdown(selectEl, names) {
      selectEl.innerHTML = "";
      names.forEach((name) => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        selectEl.appendChild(option);
      });
    }

    function numberValue(inputEl) {
      const parsed = Number(inputEl.value);
      return Number.isFinite(parsed) && parsed >= 0 ? parsed : 0;
    }

    function formatLbs(value) {
      return `${Math.round(value)}LBS`;
    }

    function calculateBagWeight() {
      return numberValue(els.bagCount) * STANDARD_WEIGHTS.bag;
    }

    function calculateTotalCargo() {
      return calculateBagWeight() + numberValue(els.cargo);
    }

    function calculatePayloadBreakdown() {
      const maleTotal = numberValue(els.males) * STANDARD_WEIGHTS.male;
      const femaleTotal = numberValue(els.females) * STANDARD_WEIGHTS.female;
      const childTotal = numberValue(els.children) * STANDARD_WEIGHTS.child;
      const cargoTotal = calculateTotalCargo();

      return {
        maleTotal,
        femaleTotal,
        childTotal,
        cargoTotal,
        totalPayload: maleTotal + femaleTotal + childTotal + cargoTotal
      };
    }

    // Copy-block standard weight lines are intentionally fixed values.
    // Total payload still uses count × standard weight in calculatePayloadBreakdown().
    function generateOutput() {
      const breakdown = calculatePayloadBreakdown();

      const text = [
        `PIC ${els.pic.value}`,
        `SIC ${els.sic.value}`,
        `FA ${els.fa.value}`,
        ``,
        `-SET THE W&B PROFILE TO: SELECT ${els.profile.value}.`,
        `-SET ADULTS COUNT TO 0.`,
        `-SET MALES COUNT TO ${numberValue(els.males)}.`,
        `-SET MALES WEIGHT TO 203LBS.`,
        `-SET FEMALES COUNT TO ${numberValue(els.females)}.`,
        `-SET FEMALES WEIGHT TO 163LBS.`,
        `-SET CHILDREN COUNT TO ${numberValue(els.children)}.`,
        `-SET CHILDREN WEIGHT TO 77LBS.`,
        `-SET BAG WEIGHT TO ${formatLbs(STANDARD_WEIGHTS.bag)}.`,
        `-SET CARGO WEIGHT TO ${formatLbs(breakdown.cargoTotal)}.`,
        `-TOTAL PAYLOAD ${formatLbs(breakdown.totalPayload)} AS PER CLIENT INSTRUCTION.`
      ].join("\n");

      els.output.value = text;
    }

    async function copyOutput() {
      try {
        await navigator.clipboard.writeText(els.output.value);
        els.copyStatus.textContent = "Copied";
      } catch (err) {
        els.output.select();
        document.execCommand("copy");
        els.copyStatus.textContent = "Copied";
      }

      window.setTimeout(() => {
        els.copyStatus.textContent = "";
      }, 1800);
    }

    function resetDefaults() {
      els.profile.value = defaults.profile;
      els.males.value = defaults.males;
      els.females.value = defaults.females;
      els.children.value = defaults.children;
      els.bagCount.value = defaults.bagCount;
      els.cargo.value = defaults.cargo;
      els.pic.selectedIndex = 0;
      els.sic.selectedIndex = 0;
      els.fa.selectedIndex = 0;
      generateOutput();
    }

    function setTheme(mode) {
      const isLight = mode === "light";
      document.body.classList.toggle("light-mode", isLight);
      els.themeToggle.textContent = isLight ? "Dark Mode" : "Light Mode";
      localStorage.setItem("dassaultHelperTheme", mode);
    }

    function toggleTheme() {
      const nextMode = document.body.classList.contains("light-mode") ? "dark" : "light";
      setTheme(nextMode);
    }

    function init() {
      populateDropdown(els.pic, picNames || crewNames);
      populateDropdown(els.sic, sicNames || crewNames);
      populateDropdown(els.fa, faNames || crewNames);

      Object.values(els).forEach((el) => {
        if (el && ["SELECT", "INPUT"].includes(el.tagName)) {
          el.addEventListener("input", generateOutput);
          el.addEventListener("change", generateOutput);
        }
      });

      els.copyBtn.addEventListener("click", copyOutput);
      els.resetBtn.addEventListener("click", resetDefaults);
      els.themeToggle.addEventListener("click", toggleTheme);

      setTheme(localStorage.getItem("dassaultHelperTheme") || "dark");

      resetDefaults();
    }

    init();
  </script>
</body>
</html>
